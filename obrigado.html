<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mensagem Enviada</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      max-width: 500px;
      padding: 40px;
      background: rgba(255,255,255,0.03);
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
    }

    h1 {
      color: #FFEA00;
      text-shadow: 0 0 10px #FFEA00;
      margin-bottom: 10px;
    }

    p {
      color: #dcdcdc;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #FFEA00;
      color: #000;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      box-shadow: 0 0 15px rgba(255, 234, 0, 0.5);
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(255, 234, 0, 0.8);
    }

    .whatsapp {
      display: block;
      margin-top: 15px;
      color: #25D366;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Mensagem Enviada 🚀</h1>
    <p>
      Recebemos seu contato e vamos responder o mais rápido possível.<br>
      Se preferir, fale diretamente conosco pelo WhatsApp.
    </p>

    <a href="/" class="btn">Voltar ao site</a>

    <a href="https://wa.me/5515991807367" class="whatsapp" target="_blank">
      Ou clique aqui para falar no WhatsApp
    </a>
  </div>

</body>
</html>
